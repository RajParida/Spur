name: Feature Request
description: Suggest a new feature for Spur
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Help us understand your feature request.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: "I'm trying to... but it's hard because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
      placeholder: Describe the feature in detail
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Approaches
      description: Any other ways to solve this?
      placeholder: |
        - Option A: ...
        - Option B: ...

  - type: textarea
    id: examples
    attributes:
      label: Use Cases
      description: When would you use this?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've checked existing feature requests
          required: true
