version: 2
updates:
  # NPM dependencies
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - owner
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 3
    reviewers:
      - owner
    labels:
      - ci
      - github-actions
    commit-message:
      prefix: "ci"
      include: "scope"

  # Maven (Backend)
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - owner
    labels:
      - dependencies
      - maven
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
